<!doctype html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>GitHub 艺术创作器 Pro</title>
    <style>
      /* ========== Theme Variables ========== */
      :root {
        --c0:#161b22; --c1:#0e4429; --c2:#006d32; --c3:#26a641; --c4:#39d353;
        --bg:#0b0f14; --panel:#0d1117; --panel2:#161b22; --border:#30363d;
        --text:#c9d1d9; --muted:#8b949e; --blue:#2f81f7; --red:#f85149; --green:#2ea043;
        --cell-outline:rgba(255,255,255,0.04); --cell-hover:rgba(255,255,255,0.35);
        --shadow:rgba(0,0,0,0.35);
      }
      [data-theme="light"] {
        --c0:#ebedf0; --c1:#9be9a8; --c2:#40c463; --c3:#30a14e; --c4:#216e39;
        --bg:#f0f2f5; --panel:#ffffff; --panel2:#f6f8fa; --border:#d0d7de;
        --text:#1f2328; --muted:#656d76; --blue:#0969da; --red:#cf222e; --green:#1a7f37;
        --cell-outline:rgba(0,0,0,0.06); --cell-hover:rgba(0,0,0,0.25);
        --shadow:rgba(0,0,0,0.12);
      }

      /* ========== Base ========== */
      * { box-sizing:border-box; }
      body {
        margin:0; font-family:-apple-system,system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        background:var(--bg); color:var(--text);
        display:flex; flex-direction:column; align-items:center; padding:26px 14px 50px;
        transition:background .3s,color .3s;
      }
      .app { width:min(980px,100%); }

      /* ========== Header ========== */
      header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
      header h1 { margin:0; font-size:18px; font-weight:700; letter-spacing:.2px; }
      #themeToggle {
        background:var(--panel2); border:1px solid var(--border); border-radius:50%;
        width:36px; height:36px; font-size:18px; cursor:pointer; color:var(--text);
        display:flex; align-items:center; justify-content:center;
        transition:transform .3s,background .3s;
      }
      #themeToggle:hover { transform:rotate(30deg); }

      /* ========== GH Panel ========== */
      .gh-wrap {
        background:var(--panel); border:1px solid var(--border); border-radius:10px;
        padding:16px 16px 12px; transition:background .3s,border-color .3s;
      }
      .gh-top { display:grid; grid-template-columns:40px 1fr; gap:8px; align-items:end; margin-bottom:6px; }
      .gh-months { position:relative; height:16px; font-size:12px; color:var(--muted); }
      .gh-months span { position:absolute; transform:translateX(-2px); white-space:nowrap; user-select:none; }
      .gh-main { display:grid; grid-template-columns:40px 1fr; gap:8px; }
      .gh-days { position:relative; font-size:12px; color:var(--muted); user-select:none; }
      .gh-days span { position:absolute; left:0; transform:translateY(-6px); }
      .gh-grid {
        display:grid; grid-auto-flow:column; grid-auto-columns:max-content;
        grid-template-rows:repeat(7,11px); gap:3px;
      }
      .gh-cell {
        width:11px; height:11px; border-radius:2px; background:var(--c0);
        cursor:pointer; outline:1px solid var(--cell-outline);
        transition:transform .1s;
      }
      .gh-cell:hover { outline:1px solid var(--cell-hover); transform:scale(1.3); z-index:2; }
      .gh-cell[data-level="1"]{ background:var(--c1); }
      .gh-cell[data-level="2"]{ background:var(--c2); }
      .gh-cell[data-level="3"]{ background:var(--c3); }
      .gh-cell[data-level="4"]{ background:var(--c4); }
      .gh-cell.out-year { visibility:hidden; pointer-events:none; }
      .gh-cell.rect-hl { outline:2px solid var(--blue)!important; transform:scale(1.15); z-index:1; }
      @keyframes previewPulse { 0%,100%{opacity:.45} 50%{opacity:.85} }
      .gh-cell.preview {
        outline:2px dashed var(--blue)!important; z-index:1;
        animation:previewPulse 1.2s ease-in-out infinite;
      }
      .gh-cell.preview[data-preview-level="1"]{ background:var(--c1); }
      .gh-cell.preview[data-preview-level="2"]{ background:var(--c2); }
      .gh-cell.preview[data-preview-level="3"]{ background:var(--c3); }
      .gh-cell.preview[data-preview-level="4"]{ background:var(--c4); }
      .gh-footer { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-top:10px; }
      .learn { color:var(--muted); font-size:12px; user-select:none; }
      .gh-legend { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted); user-select:none; }
      .gh-legend .box { width:11px; height:11px; border-radius:2px; outline:1px solid var(--cell-outline); }

      /* ========== Toolbar ========== */
      .bar { display:flex; flex-wrap:wrap; gap:10px 14px; align-items:center; justify-content:space-between; margin:14px 0 8px; }
      .palette { display:flex; gap:8px; align-items:center; }
      .palette span { color:var(--muted); font-size:13px; margin-right:4px; }
      .p-item {
        width:18px; height:18px; border-radius:3px; cursor:pointer;
        border:2px solid transparent; outline:1px solid rgba(255,255,255,0.06);
        transition:border-color .15s,transform .15s;
      }
      .p-item:hover { transform:scale(1.2); }
      .p-item.active { border-color:var(--blue); }
      .controls { display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
      select,button {
        height:34px; padding:0 12px; border-radius:8px; border:1px solid var(--border);
        background:var(--panel2); color:var(--text); cursor:pointer; font-size:13px;
        transition:background .2s,border-color .2s,opacity .2s;
      }
      button:disabled { opacity:.4; cursor:default; }
      button.primary { background:var(--green); border:none; font-weight:700; color:#fff; }
      button.primary:hover:not(:disabled) { filter:brightness(1.08); }
      button.danger { background:var(--panel2); color:var(--red); }
      button.danger:hover:not(:disabled) { border-color:var(--red); }
      button.secondary { background:var(--panel2); }
      button.secondary:hover:not(:disabled) { border-color:#6e7681; }

      /* ========== Text Bar ========== */
      .text-bar {
        display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:12px;
      }
      .text-bar input[type="text"] {
        flex:1; min-width:160px; height:34px; padding:0 12px; border-radius:8px;
        border:1px solid var(--border); background:var(--panel2); color:var(--text);
        font-size:13px; outline:none; transition:border-color .2s;
      }
      .text-bar input[type="text"]:focus { border-color:var(--blue); }
      .text-bar label { color:var(--muted); font-size:13px; white-space:nowrap; }
      .text-bar input[type="number"] {
        width:64px; height:34px; padding:0 8px; border-radius:8px;
        border:1px solid var(--border); background:var(--panel2); color:var(--text);
        font-size:13px; outline:none;
      }

      /* ========== Stats ========== */
      .stats { color:var(--muted); font-size:12px; margin-top:10px; display:flex; gap:16px; flex-wrap:wrap; }
      .stats strong { color:var(--text); }

      /* ========== Shortcuts ========== */
      .shortcuts {
        margin-top:14px; padding:12px 16px; background:var(--panel); border:1px solid var(--border);
        border-radius:10px; font-size:12px; color:var(--muted); line-height:1.8;
        transition:background .3s,border-color .3s;
      }
      .shortcuts b { color:var(--text); }
      kbd {
        display:inline-block; padding:1px 6px; border-radius:4px; font-size:11px;
        background:var(--panel2); border:1px solid var(--border); color:var(--text);
        font-family:inherit; margin:0 2px;
      }

      /* ========== Tooltip ========== */
      .tip {
        position:fixed; z-index:9999; padding:6px 8px; background:var(--panel);
        border:1px solid var(--border); border-radius:8px; color:var(--text);
        font-size:12px; pointer-events:none; display:none; white-space:nowrap;
        box-shadow:0 10px 30px var(--shadow);
      }

      /* ========== Toast ========== */
      .toast {
        position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
        padding:10px 20px; border-radius:10px; background:var(--panel); border:1px solid var(--border);
        color:var(--text); font-size:13px; opacity:0; pointer-events:none;
        box-shadow:0 8px 30px var(--shadow); transition:transform .35s cubic-bezier(.4,0,.2,1),opacity .35s;
        z-index:10000;
      }
      .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

      input[type="file"] { display:none; }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <h1>GitHub Spray Pro 🎨</h1>
        <button id="themeToggle" title="切换主题">🌙</button>
      </header>

      <div class="bar">
        <div class="palette" id="palette">
          <span>色阶:</span>
          <div class="p-item active" style="background:var(--c1)" data-l="1"></div>
          <div class="p-item" style="background:var(--c2)" data-l="2"></div>
          <div class="p-item" style="background:var(--c3)" data-l="3"></div>
          <div class="p-item" style="background:var(--c4)" data-l="4"></div>
          <div class="p-item" style="background:var(--c0)" title="擦除" data-l="0"></div>
        </div>
        <div class="controls">
          <label style="color:var(--muted);font-size:13px">年份</label>
          <select id="yearSelect"></select>
          <button class="secondary" id="btnUndo" disabled title="Ctrl+Z">↩ 撤销</button>
          <button class="secondary" id="btnRedo" disabled title="Ctrl+Shift+Z">↪ 重做</button>
          <button class="primary" id="btnSh">⬇ 下载 .sh</button>
          <button class="secondary" id="btnExportJson">导出</button>
          <button class="secondary" id="btnImportJson">导入</button>
          <input id="fileJson" type="file" accept="application/json" />
          <button class="danger" id="btnClear">清空</button>
        </div>
      </div>

      <div class="text-bar">
        <input type="text" id="textInput" placeholder="输入文字喷绘 (A-Z 0-9)..." maxlength="16" />
        <label>起始列:</label>
        <input type="number" id="textOffset" value="1" min="0" max="52" />
        <label style="display:flex;align-items:center;gap:4px;cursor:pointer">
          <input type="checkbox" id="chkClear" checked style="display:inline;width:auto;height:auto;cursor:pointer" />
          先清空
        </label>
        <button class="primary" id="btnSpray">✍ 喷绘文字</button>
      </div>

      <div class="gh-wrap" id="panel">
        <div class="gh-top"><div></div><div class="gh-months" id="ghMonths"></div></div>
        <div class="gh-main">
          <div class="gh-days" id="ghDays"></div>
          <div class="gh-grid" id="ghGrid"></div>
        </div>
        <div class="gh-footer">
          <div class="learn">左键拖拽涂色 · 右键擦除 · Shift+拖拽框选</div>
          <div class="gh-legend">
            <span>Less</span>
            <div class="box" style="background:var(--c0)"></div>
            <div class="box" style="background:var(--c1)"></div>
            <div class="box" style="background:var(--c2)"></div>
            <div class="box" style="background:var(--c3)"></div>
            <div class="box" style="background:var(--c4)"></div>
            <span>More</span>
          </div>
        </div>
      </div>

      <div class="stats" id="stats"></div>

      <div class="shortcuts">
        ⌨️ 快捷键 &nbsp;
        <kbd>1</kbd>~<kbd>4</kbd> 切换色阶 &nbsp;
        <kbd>0</kbd>/<kbd>E</kbd> 橡皮擦 &nbsp;
        <kbd>Ctrl+Z</kbd> 撤销 &nbsp;
        <kbd>Ctrl+Shift+Z</kbd> 重做 &nbsp;
        <kbd>Ctrl+S</kbd> 导出JSON
      </div>

      <div class="tip" id="tip"></div>
      <div class="toast" id="toast"></div>
    </div>

    <script>
    (() => {
    /* ========== Elements ========== */
    const $ = id => document.getElementById(id);
    const ghGrid=$('ghGrid'), ghMonths=$('ghMonths'), ghDays=$('ghDays'),
          tip=$('tip'), toast=$('toast'), panel=$('panel'),
          yearSelect=$('yearSelect'),
          btnSh=$('btnSh'), btnExportJson=$('btnExportJson'),
          btnImportJson=$('btnImportJson'), fileJson=$('fileJson'),
          btnClear=$('btnClear'), btnUndo=$('btnUndo'), btnRedo=$('btnRedo'),
          btnSpray=$('btnSpray'), textInput=$('textInput'), textOffset=$('textOffset'),
          themeToggle=$('themeToggle'), statsEl=$('stats');

    /* ========== State ========== */
    const pixels = new Map();
    let currentLevel = 1;
    let isPainting = false, paintLevel = 1, lastPaintedDate = null;
    const undoStack = [], redoStack = [];
    const MAX_UNDO = 80;
    let currentStroke = null; // Map<dateStr, {before,after}>
    const cellMap = new Map(); // "w-d" -> cell element
    let isRectMode = false, rectAnchor = null, highlightedCells = [];

    /* ========== 5×7 Pixel Font ========== */
    const FONT={
      A:[14,17,17,31,17,17,17],B:[30,17,17,30,17,17,30],C:[14,17,16,16,16,17,14],
      D:[28,18,17,17,17,18,28],E:[31,16,16,30,16,16,31],F:[31,16,16,30,16,16,16],
      G:[14,17,16,23,17,17,14],H:[17,17,17,31,17,17,17],I:[14,4,4,4,4,4,14],
      J:[7,2,2,2,2,18,12],K:[17,18,20,24,20,18,17],L:[16,16,16,16,16,16,31],
      M:[17,27,21,21,17,17,17],N:[17,25,21,19,17,17,17],O:[14,17,17,17,17,17,14],
      P:[30,17,17,30,16,16,16],Q:[14,17,17,17,21,18,13],R:[30,17,17,30,20,18,17],
      S:[14,17,16,14,1,17,14],T:[31,4,4,4,4,4,4],U:[17,17,17,17,17,17,14],
      V:[17,17,17,17,10,10,4],W:[17,17,17,21,21,21,10],X:[17,17,10,4,10,17,17],
      Y:[17,17,10,4,4,4,4],Z:[31,1,2,4,8,16,31],
      '0':[14,19,21,21,21,25,14],'1':[4,12,4,4,4,4,14],'2':[14,17,1,2,4,8,31],
      '3':[31,2,4,2,1,17,14],'4':[2,6,10,18,31,2,2],'5':[31,16,30,1,1,17,14],
      '6':[6,8,16,30,17,17,14],'7':[31,17,2,4,8,8,8],'8':[14,17,17,14,17,17,14],
      '9':[14,17,17,15,1,2,12],' ':[0,0,0,0,0,0,0],'!':[4,4,4,4,4,0,4],
      '-':[0,0,0,31,0,0,0],'.':[0,0,0,0,0,0,4],'?':[14,17,1,2,4,0,4],
      '#':[10,31,10,10,10,31,10],
    };

    /* ========== Helpers ========== */
    const pad=n=>String(n).padStart(2,'0');
    const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    function atNoon(d){ const x=new Date(d); x.setHours(12,0,0,0); return x; }
    function startOfYearGrid(y){ const j=atNoon(new Date(y,0,1)); const s=new Date(j); s.setDate(s.getDate()-s.getDay()); return s; }
    function endOfYearGrid(y){ const d=atNoon(new Date(y,11,31)); const e=new Date(d); e.setDate(e.getDate()+(6-e.getDay())); return e; }
    function downloadText(fn,c,m='text/plain'){ const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([c],{type:m})); a.download=fn; a.click(); URL.revokeObjectURL(a.href); }

    /* ========== Toast ========== */
    function showToast(msg, ms=2500){
      toast.textContent=msg; toast.classList.add('show');
      clearTimeout(toast._t); toast._t=setTimeout(()=>toast.classList.remove('show'),ms);
    }

    /* ========== localStorage ========== */
    const STORAGE_KEY='gitgreen_pixels', THEME_KEY='gitgreen_theme';
    function saveState(){
      const obj={}; for(const [k,v] of pixels) obj[k]=v;
      try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(obj)); }catch(e){}
    }
    function loadState(){
      try{
        const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return;
        const obj=JSON.parse(raw);
        for(const [k,v] of Object.entries(obj)) if(/^\d{4}-\d{2}-\d{2}$/.test(k)&&v>=1&&v<=4) pixels.set(k,v);
      }catch(e){}
    }
    function loadTheme(){
      const t=localStorage.getItem(THEME_KEY)||'dark';
      document.documentElement.setAttribute('data-theme',t);
      themeToggle.textContent=t==='dark'?'🌙':'☀️';
    }

    /* ========== Theme Toggle ========== */
    themeToggle.addEventListener('click',()=>{
      const cur=document.documentElement.getAttribute('data-theme');
      const next=cur==='dark'?'light':'dark';
      document.documentElement.setAttribute('data-theme',next);
      themeToggle.textContent=next==='dark'?'🌙':'☀️';
      localStorage.setItem(THEME_KEY,next);
    });

    /* ========== Stats ========== */
    function updateStats(){
      const yr=parseInt(yearSelect.value,10), pre=String(yr)+'-';
      let cells=0,commits=0;
      for(const [d,l] of pixels){ if(d.startsWith(pre)&&l){ cells++; commits+=l*10; } }
      statsEl.innerHTML=`已涂 <strong>${cells}</strong> 格 &nbsp;|&nbsp; 将生成 <strong>${commits}</strong> 次 commit`;
    }

    /* ========== Undo / Redo ========== */
    function updateUndoRedoBtns(){ btnUndo.disabled=!undoStack.length; btnRedo.disabled=!redoStack.length; }
    function startStroke(){ currentStroke=new Map(); }
    function recordChange(dateStr, before, after){
      if(!currentStroke) return;
      if(!currentStroke.has(dateStr)) currentStroke.set(dateStr,{before,after});
      else currentStroke.get(dateStr).after=after;
    }
    function endStroke(){
      if(currentStroke&&currentStroke.size>0){
        if(undoStack.length>=MAX_UNDO) undoStack.shift();
        undoStack.push(currentStroke); redoStack.length=0;
      }
      currentStroke=null; updateUndoRedoBtns();
    }
    function applyEntry(entry,dir){
      for(const [d,{before,after}] of entry){
        const lv=dir==='undo'?before:after;
        if(lv===0) pixels.delete(d); else pixels.set(d,lv);
        const c=ghGrid.querySelector(`[data-date="${d}"]`);
        if(c) c.setAttribute('data-level',String(lv));
      }
      saveState(); updateStats(); updateUndoRedoBtns();
    }
    function undo(){
      if(!undoStack.length) return;
      const e=undoStack.pop(); redoStack.push(e); applyEntry(e,'undo');
    }
    function redo(){
      if(!redoStack.length) return;
      const e=redoStack.pop(); undoStack.push(e); applyEntry(e,'redo');
    }
    btnUndo.addEventListener('click',undo);
    btnRedo.addEventListener('click',redo);

    /* ========== Palette ========== */
    $('palette').onclick=e=>{
      const l=e.target?.dataset?.l; if(l==null) return;
      document.querySelectorAll('.p-item').forEach(p=>p.classList.remove('active'));
      e.target.classList.add('active'); currentLevel=parseInt(l,10);
    };

    /* ========== Cell Painting ========== */
    function setCellLevel(cell,dateStr,level){
      const old=pixels.get(dateStr)??0;
      if(old===level) return;
      if(level===0) pixels.delete(dateStr); else pixels.set(dateStr,level);
      cell.setAttribute('data-level',String(level));
      recordChange(dateStr,old,level);
    }
    function paintCell(cell){
      if(!cell||cell.classList.contains('out-year')) return;
      const d=cell.dataset.date; if(!d||d===lastPaintedDate) return;
      lastPaintedDate=d; setCellLevel(cell,d,paintLevel);
    }

    /* ========== Rect Selection ========== */
    function clearHighlight(){ highlightedCells.forEach(c=>c.classList.remove('rect-hl')); highlightedCells=[]; }
    function getCellPos(cell){ return {w:+cell.dataset.week, d:+cell.dataset.day}; }
    function highlightRect(w1,d1,w2,d2){
      clearHighlight();
      const minW=Math.min(w1,w2),maxW=Math.max(w1,w2),minD=Math.min(d1,d2),maxD=Math.max(d1,d2);
      for(let w=minW;w<=maxW;w++) for(let d=minD;d<=maxD;d++){
        const c=cellMap.get(`${w}-${d}`);
        if(c&&!c.classList.contains('out-year')){ c.classList.add('rect-hl'); highlightedCells.push(c); }
      }
    }
    function fillRect(w1,d1,w2,d2){
      startStroke();
      const minW=Math.min(w1,w2),maxW=Math.max(w1,w2),minD=Math.min(d1,d2),maxD=Math.max(d1,d2);
      for(let w=minW;w<=maxW;w++) for(let d=minD;d<=maxD;d++){
        const c=cellMap.get(`${w}-${d}`);
        if(c&&!c.classList.contains('out-year')) setCellLevel(c,c.dataset.date,currentLevel);
      }
      endStroke(); saveState(); updateStats();
    }

    /* ========== Render Grid ========== */
    const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    function renderGrid(year){
      ghGrid.innerHTML=''; ghMonths.innerHTML=''; ghDays.innerHTML=''; cellMap.clear();
      const start=startOfYearGrid(year), end=endOfYearGrid(year);
      const totalDays=Math.round((end-start)/864e5)+1, weeks=Math.ceil(totalDays/7);
      [{t:'Mon',r:1},{t:'Wed',r:3},{t:'Fri',r:5}].forEach(({t,r})=>{
        const s=document.createElement('span'); s.textContent=t; s.style.top=`${r*14}px`; ghDays.appendChild(s);
      });
      for(let m=0;m<12;m++){
        const f=atNoon(new Date(year,m,1)), ws=new Date(f); ws.setDate(ws.getDate()-ws.getDay());
        const col=Math.round((ws-start)/864e5/7);
        if(col>=0&&col<weeks){ const t=document.createElement('span'); t.textContent=MONTHS[m]; t.style.left=`${col*14}px`; ghMonths.appendChild(t); }
      }
      for(let w=0;w<weeks;w++) for(let r=0;r<7;r++){
        const d=new Date(start); d.setDate(start.getDate()+w*7+r);
        const ds=ymd(d), cell=document.createElement('div');
        cell.className='gh-cell'; cell.dataset.date=ds; cell.dataset.week=w; cell.dataset.day=r;
        if(d.getFullYear()!==year) cell.classList.add('out-year');
        cell.setAttribute('data-level',String(pixels.get(ds)??0));
        cellMap.set(`${w}-${r}`,cell);
        cell.addEventListener('mouseenter',()=>{ tip.style.display='block'; tip.textContent=`${pixels.get(ds)??0} level · ${ds}`; });
        cell.addEventListener('mousemove',e=>{ tip.style.left=e.clientX+12+'px'; tip.style.top=e.clientY+12+'px'; });
        cell.addEventListener('mouseleave',()=>{ tip.style.display='none'; });
        cell.addEventListener('mousedown',e=>{
          e.preventDefault();
          if(e.shiftKey){ isRectMode=true; rectAnchor=getCellPos(cell); highlightRect(rectAnchor.w,rectAnchor.d,rectAnchor.w,rectAnchor.d); return; }
          paintLevel=e.button===2?0:currentLevel;
          isPainting=true; lastPaintedDate=null; startStroke(); paintCell(cell);
        });
        cell.addEventListener('mouseenter',e=>{
          if(isRectMode&&rectAnchor){ const p=getCellPos(cell); highlightRect(rectAnchor.w,rectAnchor.d,p.w,p.d); return; }
          if(!isPainting) return; paintCell(cell);
        });
        ghGrid.appendChild(cell);
      }
      updateStats();
    }

    /* Global mouse events */
    window.addEventListener('mouseup',e=>{
      if(isRectMode&&rectAnchor){
        const target=document.elementFromPoint(e.clientX,e.clientY);
        const cell=target?.closest?.('.gh-cell');
        if(cell){ const p=getCellPos(cell); fillRect(rectAnchor.w,rectAnchor.d,p.w,p.d); }
        clearHighlight(); isRectMode=false; rectAnchor=null; return;
      }
      if(isPainting){ isPainting=false; lastPaintedDate=null; endStroke(); saveState(); updateStats(); }
    });
    panel.addEventListener('contextmenu',e=>e.preventDefault());

    /* ========== Text-to-Pixel ========== */
    const chkClear=$('chkClear');
    let previewCells=[];

    function getTextPixels(text,startCol,level){
      const result=[]; let col=startCol;
      for(const ch of text.toUpperCase()){
        const glyph=FONT[ch]; if(!glyph){ col+=3; continue; }
        for(let c=0;c<5;c++) for(let r=0;r<7;r++){
          if(glyph[r]&(1<<(4-c))) result.push({w:col+c,d:r,level});
        }
        col+=6;
      }
      return result;
    }

    function clearPreview(){
      for(const c of previewCells){ c.classList.remove('preview'); c.removeAttribute('data-preview-level'); }
      previewCells=[];
    }

    function showPreview(){
      clearPreview();
      const text=textInput.value.trim(); if(!text) return;
      const startW=parseInt(textOffset.value,10)||0;
      const lvl=currentLevel||1;
      const pts=getTextPixels(text,startW,lvl);
      for(const {w,d,level} of pts){
        const cell=cellMap.get(`${w}-${d}`);
        if(cell&&!cell.classList.contains('out-year')){
          cell.classList.add('preview'); cell.setAttribute('data-preview-level',String(level));
          previewCells.push(cell);
        }
      }
    }

    textInput.addEventListener('input',showPreview);
    textOffset.addEventListener('input',showPreview);
    // Also update preview when palette changes
    const origPaletteClick=$('palette').onclick;
    $('palette').onclick=e=>{ origPaletteClick?.(e); setTimeout(showPreview,0); };

    btnSpray.addEventListener('click',()=>{
      const text=textInput.value.toUpperCase().trim(); if(!text){ showToast('⚠️ 请输入文字'); return; }
      const startW=parseInt(textOffset.value,10)||0;
      const lvl=currentLevel||1;
      clearPreview();
      startStroke();
      // Clear canvas first if checkbox is checked
      if(chkClear.checked){
        for(const [d,l] of pixels) recordChange(d,l,0);
        pixels.clear();
        // Reset all visible cells to level 0
        ghGrid.querySelectorAll('.gh-cell:not(.out-year)').forEach(c=>c.setAttribute('data-level','0'));
      }
      // Spray text
      const pts=getTextPixels(text,startW,lvl);
      for(const {w,d,level} of pts){
        const cell=cellMap.get(`${w}-${d}`);
        if(cell&&!cell.classList.contains('out-year')) setCellLevel(cell,cell.dataset.date,level);
      }
      endStroke(); saveState(); updateStats();
      showToast(`✍ 已喷绘 "${text}"`);
    });

    /* ========== Year Select ========== */
    function initYearSelect(){
      const now=new Date().getFullYear();
      yearSelect.innerHTML=Array.from({length:11},(_,i)=>now-i).map(y=>`<option value="${y}">${y}</option>`).join('');
      yearSelect.value=String(now);
    }
    yearSelect.addEventListener('change',()=>{ renderGrid(parseInt(yearSelect.value,10)); });

    /* ========== Export .sh ========== */
    btnSh.addEventListener('click',()=>{
      const year=parseInt(yearSelect.value,10);
      const entries=[...pixels.entries()].filter(([d,l])=>l&&d.startsWith(year+'-')).sort((a,b)=>a[0]<b[0]?-1:1);
      if(!entries.length){ showToast('⚠️ 当前年份画布为空'); return; }
      const mul=10;
      let s=`#!/bin/bash\nset -e\ngit rev-parse --is-inside-work-tree >/dev/null 2>&1 || { echo "❌ 请在 git 仓库目录运行"; exit 1; }\nbranch=$(git rev-parse --abbrev-ref HEAD)\necho "分支: $branch | 年份: ${year} | 格子: ${entries.length}"\n\n`;
      for(const [d,l] of entries){
        const dt=`${d} 12:00:00`, n=l*mul;
        s+=`echo "绘制 ${d} (level=${l}, commits=${n})"\nfor i in $(seq 1 ${n}); do\n  GIT_AUTHOR_DATE="${dt}" GIT_COMMITTER_DATE="${dt}" git commit --allow-empty -m "spray art ${year}" >/dev/null\ndone\n\n`;
      }
      s+=`echo "✅ 本地完成"\ngit push origin "$branch"\necho "🚀 已推送"\n`;
      downloadText(`spray_${year}.sh`,s,'text/x-shellscript');
      showToast('✅ 脚本已下载');
    });

    /* ========== JSON Export/Import ========== */
    btnExportJson.addEventListener('click',()=>{
      const p={version:1,exportedAt:new Date().toISOString(),data:Object.fromEntries(pixels)};
      downloadText(`spray_backup_${yearSelect.value}.json`,JSON.stringify(p,null,2),'application/json');
      showToast('✅ JSON 已导出');
    });
    btnImportJson.addEventListener('click',()=>fileJson.click());
    fileJson.addEventListener('change',async e=>{
      const f=e.target.files?.[0]; if(!f) return;
      try{
        const j=JSON.parse(await f.text()), data=j?.data&&typeof j.data==='object'?j.data:j;
        startStroke(); let count=0;
        for(const [k,v] of Object.entries(data)){
          if(!/^\d{4}-\d{2}-\d{2}$/.test(k)) continue;
          const lv=Number(v), old=pixels.get(k)??0;
          if(lv>=1&&lv<=4){ pixels.set(k,lv); recordChange(k,old,lv); count++; }
          else if(old){ pixels.delete(k); recordChange(k,old,0); }
        }
        endStroke(); renderGrid(parseInt(yearSelect.value,10)); saveState();
        showToast(`✅ 导入 ${count} 个日期`);
      }catch(err){ showToast('❌ JSON 格式不正确'); }
      finally{ fileJson.value=''; }
    });

    /* ========== Clear ========== */
    btnClear.addEventListener('click',()=>{
      if(!pixels.size){ showToast('画布已经是空的'); return; }
      if(!confirm('确定清空画布吗？所有年份数据都会清除。')) return;
      startStroke();
      for(const [d,l] of pixels) recordChange(d,l,0);
      pixels.clear(); endStroke();
      renderGrid(parseInt(yearSelect.value,10)); saveState();
      showToast('✅ 画布已清空');
    });

    /* ========== Keyboard Shortcuts ========== */
    window.addEventListener('keydown',e=>{
      if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT') return;
      const k=e.key.toLowerCase();
      if(k>='1'&&k<='4'){ currentLevel=+k; document.querySelectorAll('.p-item').forEach(p=>p.classList.toggle('active',p.dataset.l===k)); e.preventDefault(); return; }
      if(k==='0'||k==='e'){ currentLevel=0; document.querySelectorAll('.p-item').forEach(p=>p.classList.toggle('active',p.dataset.l==='0')); e.preventDefault(); return; }
      if((e.ctrlKey||e.metaKey)&&k==='z'&&!e.shiftKey){ e.preventDefault(); undo(); return; }
      if((e.ctrlKey||e.metaKey)&&k==='z'&&e.shiftKey){ e.preventDefault(); redo(); return; }
      if((e.ctrlKey||e.metaKey)&&k==='y'){ e.preventDefault(); redo(); return; }
      if((e.ctrlKey||e.metaKey)&&k==='s'){ e.preventDefault(); btnExportJson.click(); return; }
    });

    /* ========== Init ========== */
    loadTheme(); loadState(); initYearSelect();
    renderGrid(parseInt(yearSelect.value,10));

    })();
    </script>
  </body>
</html>
